{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">➕ Добавить часы себе (админ)</div>
    <form method="POST">
        <div class="form-group">
            <label>Дата</label>
            <input type="date" name="date" required>
        </div>
        
        <div class="form-group">
            <label>Количество часов</label>
            <input type="number" name="hours" step="0.5" min="0.5" max="24" required>
        </div>
        
        <div class="form-group">
            <label>Причина</label>
            <textarea name="reason" rows="3" required placeholder="Например: дополнительная работа..."></textarea>
        </div>
        
        <button type="submit">💾 Добавить часы</button>
        <a href="{{ url_for('dashboard') }}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
